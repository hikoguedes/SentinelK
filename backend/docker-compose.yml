version: '3.8'

services:
  mongodb:
    image: mongo:4.4.18
    container_name: middleware-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=adminpassword
    # Removido temporariamente para evitar corrupção de disco no Windows/WSL2
    # volumes:
    #  - mongo_data:/data/db
    restart: unless-stopped

  # Ferramenta opcional para visualizar o banco no navegador (tipo PhpMyAdmin)
  mongo-express:
    image: mongo-express
    container_name: middleware-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:adminpassword@mongodb:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=adminpassword
    depends_on:
      - mongodb

  # A nossa API em Node.js (Backend)
  api:
    build: .
    container_name: middleware-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3333
      - MONGO_URL=mongodb://admin:adminpassword@mongodb:27017/middleware?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongo_data:
