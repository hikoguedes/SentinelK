<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentinelK - Login Unificado</title>
  <link rel="stylesheet" href="index.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%), var(--bg-darker);
      padding: 24px;
    }
    
    .login-container {
      width: 100%;
      max-width: 450px;
      animation: fadeInUp 0.6s ease;
    }
    
    .glass-login-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(16px);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
    }
    
    .logo-text {
      font-weight: 800;
      font-size: 1.6rem;
      font-family: var(--font-title);
      letter-spacing: -0.02em;
      color: var(--text-main);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }
    
    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .input-wrapper input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
      margin-top: 28px;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .helper-panel {
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 0.8rem;
      text-align: left;
    }
    
    .helper-title {
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .credential-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: color 0.2s ease;
    }
    
    .credential-row:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .credential-row:hover {
      color: var(--accent-purple);
    }
    
    .credential-role {
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="glass-login-panel">
      
      <div class="logo-container animate-fade">
        <img src="logo.png" alt="SentinelK Logo" style="height: 42px; width: auto; object-fit: contain;">
        <span class="logo-text">SENTINELK</span>
      </div>
      
      <h2 style="text-align: center; margin-bottom: 8px; font-size: 1.4rem;">Área Restrita</h2>
      <p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 32px;">
        Identifique-se para acessar os painéis operacionais e integradores.
      </p>
      
      <div class="error-msg" id="error-box">
        <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
        <span id="error-text">Credenciais inválidas.</span>
      </div>
      
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">E-mail Corporativo</label>
          <div class="input-wrapper">
            <i data-lucide="mail"></i>
            <input type="email" id="email" required placeholder="seuemail@empresa.com">
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Senha de Acesso</label>
          <div class="input-wrapper">
            <i data-lucide="lock"></i>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
        </div>
        
        <button type="submit" class="btn-login" id="login-btn">
          <span>Acessar Painel</span>
          <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
        </button>
      </form>
      
      <!-- Credenciais de Teste rápidas -->
      <div class="helper-panel animate-fade">
        <div class="helper-title">
          <i data-lucide="key-round" style="width: 14px; height: 14px; color: var(--accent-purple);"></i>
          <span>Acessos de Teste (Clique para preencher)</span>
        </div>
        <div class="credential-row" onclick="fillCredentials('admin@sentinelk.com', 'admin123')">
          <span class="credential-role">1. SuperAdmin (SentinelK)</span>
          <span style="color: var(--accent-purple); font-family: monospace;">admin123</span>
        </div>
        <div class="credential-row" onclick="fillCredentials('parceiro@hotel.com', 'partner123')">
          <span class="credential-role">2. Gestor Parceiro (B2B)</span>
          <span style="color: var(--accent-purple); font-family: monospace;">partner123</span>
        </div>
        <div class="credential-row" onclick="fillCredentials('recepcao@restaurante.com', 'recepcao123')">
          <span class="credential-role">3. Recepção / Maitre</span>
          <span style="color: var(--accent-purple); font-family: monospace;">recepcao123</span>
        </div>
      </div>
      
      <div style="text-align: center; margin-top: 24px;">
        <a href="index.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: color 0.3s ease;" onmouseover="this.style.color='var(--text-main)'" onmouseout="this.style.color='var(--text-muted)'">
          <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Voltar ao Marketplace público
        </a>
      </div>

    </div>
  </div>

  <script>

    function getApiUrl(path) {
      const loc = window.location;
      // Se estiver acessando via sub-caminho /admin ou pelo subdominio sentinelk.unycopass.com.br
      if (loc.pathname.startsWith('/admin')) {
        return '/admin/api' + path;
      }
      if (loc.hostname === 'sentinelk.unycopass.com.br') {
        return '/api' + path;
      }
      // Se acessar direto via portas no ambiente de dev ou direto na EC2
      return `${loc.protocol}//${loc.hostname}:3333/api${path}`;
    }

    lucide.createIcons();

    function fillCredentials(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      document.getElementById('error-box').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const errorText = document.getElementById('error-text');
      const btn = document.getElementById('login-btn');
      
      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span>Verificando...</span><i data-lucide="loader" class="spin" style="width: 18px; height: 18px;"></i>';
      lucide.createIcons();

      try {
        const response = await fetch(getApiUrl("/auth/login"), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Salva sessão
          localStorage.setItem('sentinel_session', JSON.stringify({
            user: data.user,
            token: data.token
          }));

          // Redireciona com base na role
          const role = data.user.role;
          if (role === 'superadmin') {
            window.location.href = 'sentinelk/dashboard.html';
          } else if (role === 'partner_manager') {
            window.location.href = 'partner/b2b-setup.html';
          } else if (role === 'reception') {
            window.location.href = 'partner/b2b-restaurante.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          errorText.innerText = data.error || 'Credenciais incorretas.';
          errorBox.style.display = 'flex';
          resetBtn();
        }
      } catch (err) {
        console.error(err);
        errorText.innerText = 'Não foi possível conectar ao servidor backend.';
        errorBox.style.display = 'flex';
        resetBtn();
      }
    }

    function resetBtn() {
      const btn = document.getElementById('login-btn');
      btn.disabled = false;
      btn.innerHTML = '<span>Acessar Painel</span><i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
      lucide.createIcons();
    }
  </script>
</body>
</html>
